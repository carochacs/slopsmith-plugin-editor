name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        # numpy + librosa back the chroma/DTW sync-offset tests
        # (tests/test_sync_offset.py); librosa pulls in numpy/scipy/numba.
        run: pip install pytest numpy librosa
      - name: Run Python tests
        run: python -m pytest tests/ -v

  test-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run JS tests
        run: npm test
